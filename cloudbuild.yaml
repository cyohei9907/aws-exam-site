# Cloud Build CI/CD — aws-exam-site
# Triggered on push to main branch
# Builds Vue3 + Fastify, deploys to acggs-prod VM
# SAFE: only restarts aws-exam.service, never touches acggs service

steps:
  # ─── Install deps + Build API + Build Web ───────────────────────────────────
  - name: 'node:20'
    id: 'build'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        npm install -g pnpm@9
        pnpm install --frozen-lockfile
        pnpm --filter @aws-exam-site/api run build
        pnpm --filter @aws-exam-site/web run build

  # ─── Deploy to Compute Engine VM ────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['build']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        ZONE=asia-northeast1-a
        INSTANCE=acggs-prod

        # Suppress SSH host key prompts (fresh container, no known_hosts)
        mkdir -p ~/.ssh
        printf 'Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' > ~/.ssh/config
        chmod 600 ~/.ssh/config

        echo "==> Preparing staging directory on VM..."
        gcloud compute ssh "$$INSTANCE" --zone="$$ZONE" --project="$PROJECT_ID" \
          --command='rm -rf /tmp/aws-exam-deploy && mkdir -p /tmp/aws-exam-deploy'

        echo "==> Uploading API build..."
        # SCP copies 'api/dist' directory INTO /tmp/aws-exam-deploy/, creating /tmp/aws-exam-deploy/dist/
        # (dest must NOT pre-exist as a dir to avoid double-nesting)
        gcloud compute scp --recurse api/dist \
          "$$INSTANCE:/tmp/aws-exam-deploy/api-dist" \
          --zone="$$ZONE" --project="$PROJECT_ID"
        gcloud compute scp api/package.json \
          "$$INSTANCE:/tmp/aws-exam-deploy/api-package.json" \
          --zone="$$ZONE" --project="$PROJECT_ID"

        echo "==> Uploading web build..."
        gcloud compute scp --recurse web/dist \
          "$$INSTANCE:/tmp/aws-exam-deploy/web-dist" \
          --zone="$$ZONE" --project="$PROJECT_ID"

        echo "==> Running deploy on VM (only aws-exam-site, acggs is untouched)..."
        gcloud compute ssh "$$INSTANCE" --zone="$$ZONE" --project="$PROJECT_ID" \
          --command='
            set -e
            sudo rsync -a /tmp/aws-exam-deploy/api-dist/ /var/www/aws-exam-site/api/dist/
            sudo cp /tmp/aws-exam-deploy/api-package.json /var/www/aws-exam-site/api/package.json
            sudo rsync -a --delete /tmp/aws-exam-deploy/web-dist/ /var/www/aws-exam-site/web/dist/
            cd /var/www/aws-exam-site/api && sudo npm install --omit=dev --silent
            sudo chown -R aws-exam:aws-exam /var/www/aws-exam-site
            rm -rf /tmp/aws-exam-deploy
            sudo systemctl restart aws-exam
            sleep 2 && sudo systemctl is-active --quiet aws-exam && echo "aws-exam service OK"
          '
        echo "==> Deploy complete: https://aws.cyohei.net"

options:
  machineType: 'E2_HIGHCPU_8'
  logging: 'CLOUD_LOGGING_ONLY'
